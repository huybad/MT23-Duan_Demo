# Ép Spring Boot dùng Driver SQL Server
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# URL kết nối (Hãy chắc chắn tên database là QL_SinhVien)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=QL_SinhVien;encrypt=true;trustServerCertificate=true

# Tài khoản SQL Server của bạn
spring.datasource.username=sa
spring.datasource.password=123456

# Cấu hình Hibernate cho SQL Server
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
server.port=8081